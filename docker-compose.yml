# Docker Compose for CLMS (Contract Lifecycle Management System)
#
# SETUP: Before running, copy the environment file:
#   cp backend/.env.example backend/.env
# Then edit backend/.env with your actual API keys and configuration.
#
# USAGE:
#   docker-compose up --build
#   Access frontend at http://localhost:3000
#   Access backend API at http://localhost:8000
#
# NOTE: This uses separate frontend/backend services. For a single-container
# deployment, use the root Dockerfile directly instead:
#   docker build -t clms . && docker run -p 8000:8000 --env-file backend/.env clms

version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clms-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - backend-data:/app/backend/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clms-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  backend-data:
